<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Melee — The Fantasy Trip</title>
<style>
  :root {
    --bg: #34313f; --panel: #3f3c4c; --ink: #f1eff6; --muted: #c0b9cf;
    --line: #5a546b; --hex: #4d4960; --hex-stroke: #6a6480;
    --red: #d0524f; --blue: #4f86d0; --green: #57b894; --gold: #e0b13c; --violet: #b07ad8;
    --reach: #3a6f4a; --reach2: #5fae74;
    --target: #d8b54a; --accent: #8a78d0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 14px/1.45 system-ui, sans-serif; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--line);
           display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .5px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .wrap { display: flex; gap: 0; height: calc(100vh - 49px); }
  .arena { flex: 1; overflow: auto; display: grid; place-items: center; padding: 16px; }
  aside { width: 340px; border-left: 1px solid var(--line); background: var(--panel);
          display: flex; flex-direction: column; overflow: auto; }
  .pad { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .seclabel { padding: 9px 16px 3px; color: var(--muted); font-size: 11px;
              text-transform: uppercase; letter-spacing: .6px; }
  .banner { font-weight: 600; }
  .muted { color: var(--muted); }
  button { background: #2f2b3b; color: var(--ink); border: 1px solid var(--line);
           border-radius: 7px; padding: 7px 11px; font-size: 13px; cursor: pointer;
           margin: 3px 4px 3px 0; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a1622; font-weight: 600; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .chip { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px;
          border: 1px solid var(--line); }
  .chip.red { color: var(--red); border-color: var(--red); }
  .chip.blue { color: var(--blue); border-color: var(--blue); }
  .chip.green { color: var(--green); border-color: var(--green); }
  .chip.gold { color: var(--gold); border-color: var(--gold); }
  .chip.violet { color: var(--violet); border-color: var(--violet); }
  #log { flex: 1 1 140px; min-height: 120px; overflow: auto; padding: 6px 16px 10px;
         font-size: 12.5px; }
  #log div { padding: 2px 0; border-bottom: 1px solid #2a2733; color: var(--muted); }
  .roster .row { display: flex; justify-content: space-between; padding: 4px 0;
                 border-bottom: 1px solid #2a2733; cursor: pointer; }
  .roster .row:hover { color: #fff; }
  .roster .row.dead { opacity: .4; text-decoration: line-through; }
  polygon.hex { fill: var(--hex); stroke: var(--hex-stroke); stroke-width: 1.2; }
  polygon.hex.entrance { fill: #262338; }
  polygon.hex.reach { fill: var(--reach); cursor: pointer; }
  polygon.hex.reach:hover { fill: var(--reach2); }
  polygon.hex.chosen { fill: #c9a227; stroke: #fff; stroke-width: 2.5; cursor: pointer; }
  polygon.hex.chosen:hover { fill: #e0b842; }
  .fig { cursor: pointer; }
  .fig .body { stroke: #100f15; stroke-width: 2; }
  .fig.sel .body { stroke: #fff; stroke-width: 3; }
  .fig.target .body { stroke: var(--target); stroke-width: 3.5; }
  .fig.prone .body { opacity: .65; }
  .fig.dodge .body { stroke-dasharray: 3 3; stroke: var(--target); }
  .fig text { fill: #100f15; font-weight: 700; font-size: 13px; text-anchor: middle;
              dominant-baseline: central; pointer-events: none; }
  .hint { color: var(--accent); font-size: 12.5px; min-height: 18px; }
  #editor, #setup { display: none; position: fixed; inset: 0; background: #0009; z-index: 50;
            flex-direction: column; align-items: center; overflow: auto; }
  #editorBox { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
               margin: 24px; padding: 16px 18px; width: min(700px, 94vw); }
  #editorRoster .card { border: 1px solid var(--line); border-radius: 8px;
                        padding: 10px 12px; margin: 8px 0; }
  #editor input, #editor select { background: #2f2b3b; color: var(--ink);
    border: 1px solid var(--line); border-radius: 5px; padding: 3px 5px; margin: 1px; }
  #editor label { white-space: nowrap; }
</style>
</head>
<body>
<header>
  <h1>Melee</h1>
  <span class="sub">The Fantasy Trip — man-to-man combat</span>
  <span class="sub" id="turnInfo"></span>
</header>
<div class="wrap">
  <div class="arena"><svg id="svg"></svg></div>
  <aside>
    <div class="pad">
      <div class="banner" id="phaseBanner">Loading…</div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="seclabel">Game status</div>
    <div id="log"></div>
    <div class="pad roster" id="roster"></div>
    <div class="pad" id="controls"></div>
    <div class="pad">
      <button class="primary" onclick="openSetup()">New game</button>
    </div>
    <div class="pad" id="selInfo"><span class="muted">No figure selected.</span></div>
  </aside>
</div>
<div id="setup">
  <div id="editorBox">
    <div class="banner">New game</div>
    <div style="margin-top:8px">
      <label>Rules
        <select id="profile">
          <option value="Classic Melee">Classic Melee</option>
          <option value="Tarmar">Tarmar (d20)</option>
        </select>
      </label>
    </div>
    <div style="margin-top:8px">
      <label>Mode
        <select id="mode">
          <option value="pxai">Player vs Computer</option>
          <option value="pxp">Player vs Player (hot-seat)</option>
        </select>
      </label>
    </div>
    <div style="margin-top:8px">
      <label>Teams <select id="teams"><option>2</option><option>3</option><option>4</option><option>5</option></select></label>
      <label>Combatants per team <select id="perTeam"><option>1</option><option selected>2</option><option>3</option></select></label>
    </div>
    <div style="margin-top:12px">
      <button class="primary" onclick="startSetup()">Begin game</button>
      <button onclick="closeSetup()">Cancel</button>
      <button onclick="openEditor()">Customize fighters… (2-team)</button>
    </div>
  </div>
</div>
<div id="editor">
  <div id="editorBox">
    <div class="banner">Customize fighters</div>
    <div class="muted">Edit each fighter's stats and gear. Only legal choices start a match.</div>
    <div id="editorRoster"></div>
    <div class="hint" id="editorErr"></div>
    <div style="margin-top:8px">
      <button class="primary" onclick="startCustom()">Start match</button>
      <button onclick="closeEditor()">Cancel</button>
    </div>
  </div>
</div>
<script>
const SVG = "http://www.w3.org/2000/svg";
let GID = null, S = null, LAYOUT = null, PROFILE = null;
let sel = null;          // selected figure uid
let optInfo = null;      // options payload for selected figure
let chosenOption = null; // option string chosen for movement
let pendingDest = null;  // hex label
let pendingFacing = null;// facing index
let pendingReady = null; // carried weapon to switch to

const $ = id => document.getElementById(id);
const api = (path, opts) => fetch(path, opts).then(r => r.json());

async function startGame(query) {
  const data = await api(`/api/game/new?${query}`);
  GID = data.gid; LAYOUT = data.layout; S = data.state; PROFILE = data.profile;
  resetSelection(); render();
}
function bootGame() { startGame("teams=2&per_team=2&mode=pxai"); }  // default on load
function openSetup() { $("setup").style.display = "flex"; }
function closeSetup() { $("setup").style.display = "none"; }
async function startSetup() {
  const p = encodeURIComponent($("profile").value);
  const q = `profile=${p}&mode=${$("mode").value}&teams=${$("teams").value}&per_team=${$("perTeam").value}`;
  await startGame(q);
  closeSetup();
}
async function refresh() {
  const data = await api(`/api/game/${GID}`);
  LAYOUT = data.layout; S = data.state; render();
}
async function act(body) {
  const data = await api(`/api/game/${GID}/action`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });
  if (data.error) { flash(data.error); return null; }
  S = data.state; LAYOUT = data.layout;
  return data;
}
function flash(msg) { $("hint").textContent = msg; }
function resetSelection() { sel = null; optInfo = null; chosenOption = null; pendingDest = null; pendingFacing = null; pendingReady = null; }

function figByUid(uid) { return S.figures.find(f => f.uid === uid); }

// human-readable labels + which options require a destination hex
const PHASE_LABEL = {initiative: "Initiative", move: "Movement", combat: "Combat"};
const OPTION_LABEL = {
  move: "Full move", half_move: "Half move", charge_attack: "Charge & Attack", dodge: "Dodge",
  ready_weapon: "Ready Weapon", missile_attack: "Missile Attack", stand_up: "Stand Up",
  shift_attack: "Shift & Attack", shift_defend: "Shift & Defend",
  one_last_shot: "One Last Shot", change_weapons: "Change Weapons", disengage: "Disengage",
};
const NEEDS_DEST = new Set(["move", "half_move", "charge_attack", "dodge", "disengage"]);
const WEAPON_CHANGE = new Set(["ready_weapon", "change_weapons"]);
const TEAM_FILL = {red: "#d0524f", blue: "#4f86d0", green: "#57b894", gold: "#e0b13c", violet: "#b07ad8"};
const fillFor = side => TEAM_FILL[side] || "#888";
const optLabel = o => OPTION_LABEL[o] || o;

// health pool: Fatigue for Tarmar figures, ST for classic Melee
const hpCur = f => f.model === "tarmar" ? f.fatigue : f.st;
const hpMax = f => f.model === "tarmar" ? f.max_fatigue : f.max_st;
function svgRect(x, y, w, h, fill) {
  const r = document.createElementNS(SVG, "rect");
  r.setAttribute("x", x); r.setAttribute("y", y);
  r.setAttribute("width", Math.max(0, w)); r.setAttribute("height", h);
  r.setAttribute("rx", 1.5); r.setAttribute("fill", fill);
  return r;
}

// ---- rendering --------------------------------------------------------------
function render() {
  if (!S) return;
  drawArena();
  drawControls();
  drawSelInfo();
  drawRoster();
  drawLog();
  const vsComputer = S.controllers && Object.values(S.controllers).includes("computer");
  $("turnInfo").textContent = (PROFILE || "") + (vsComputer ? " · vs Computer" : " · hot-seat");
  maybeAutoSelect();
}

function drawArena() {
  const svg = $("svg");
  svg.setAttribute("viewBox", `0 0 ${LAYOUT.width} ${LAYOUT.height}`);
  svg.setAttribute("width", LAYOUT.width);
  svg.setAttribute("height", LAYOUT.height);
  svg.innerHTML = "";

  const reach = new Set((chosenOption && optInfo)
    ? (optInfo.options.find(o => o.option === chosenOption)?.reach || []) : []);

  for (const label in LAYOUT.hexes) {
    const h = LAYOUT.hexes[label];
    const poly = document.createElementNS(SVG, "polygon");
    poly.setAttribute("points", h.points.map(p => p.join(",")).join(" "));
    poly.setAttribute("class", "hex" + (reach.has(label) ? " reach" : "")
      + (label === pendingDest ? " chosen" : ""));
    if (reach.has(label)) poly.addEventListener("click", () => onReachClick(label));
    svg.appendChild(poly);
  }

  for (const f of S.figures) {
    if (!f.label) continue;
    const h = LAYOUT.hexes[f.label];
    const g = document.createElementNS(SVG, "g");
    let cls = "fig " + f.side;
    if (f.uid === sel) cls += " sel";
    if (isTarget(f.uid)) cls += " target";
    if (f.posture === "prone") cls += " prone";
    if (f.dodging) cls += " dodge";
    g.setAttribute("class", cls);

    // facing wedge toward the front hex
    if (f.front_label && LAYOUT.hexes[f.front_label]) {
      const fh = LAYOUT.hexes[f.front_label];
      const dx = fh.cx - h.cx, dy = fh.cy - h.cy;
      const len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len;
      const r = LAYOUT.size * 0.62;
      const tip = document.createElementNS(SVG, "polygon");
      const px = h.cx + ux * (r + 8), py = h.cy + uy * (r + 8);
      const ox = -uy, oy = ux;
      tip.setAttribute("points",
        `${px},${py} ${h.cx + ux*r + ox*7},${h.cy + uy*r + oy*7} ${h.cx + ux*r - ox*7},${h.cy + uy*r - oy*7}`);
      tip.setAttribute("fill", fillFor(f.side));
      g.appendChild(tip);
    }

    const body = document.createElementNS(SVG, "circle");
    body.setAttribute("class", "body");
    body.setAttribute("cx", h.cx); body.setAttribute("cy", h.cy);
    body.setAttribute("r", LAYOUT.size * 0.6);
    body.setAttribute("fill", f.dead ? "#555" : fillFor(f.side));
    g.appendChild(body);

    const txt = document.createElementNS(SVG, "text");
    txt.setAttribute("x", h.cx); txt.setAttribute("y", h.cy);
    txt.textContent = f.dead ? "✗" : hpCur(f);
    g.appendChild(txt);

    if (!f.dead) {                                   // health bar beneath the token
      const bw = LAYOUT.size * 1.1, bh = 5;
      const bx = h.cx - bw / 2, by = h.cy + LAYOUT.size * 0.62;
      const frac = Math.max(0, Math.min(1, hpCur(f) / (hpMax(f) || 1)));
      g.appendChild(svgRect(bx, by, bw, bh, "#0009"));
      g.appendChild(svgRect(bx, by, bw * frac, bh,
        frac > 0.5 ? "#5fae74" : frac > 0.25 ? "#d8b54a" : "#d0524f"));
    }

    g.addEventListener("click", () => onFigureClick(f));
    svg.appendChild(g);
  }
}

function isTarget(uid) {
  if (S.phase !== "combat" || !sel) return false;
  const attacker = figByUid(sel);
  const me = figByUid(uid);
  return attacker && me && attacker.side !== me.side && validTargets().includes(uid);
}
function validTargets() {
  if (!optInfo) return [];
  const f = figByUid(sel);
  if (!f) return [];
  const w = f.weapon;
  // attacker must have chosen an attack option (reflected in optInfo at move time)
  return optInfo._targets || [];
}

// ---- controls ---------------------------------------------------------------
function drawControls() {
  const c = $("controls"); c.innerHTML = "";
  const phase = S.phase;
  $("phaseBanner").textContent = bannerFor(phase);

  if (S.victory) {
    addBtn(c, "End turn → new round", () => act({type:"end_turn"}).then(after), true);
    return;
  }
  if (phase === "initiative") {
    if (!S.winner) {
      addBtn(c, "Roll initiative", async () => {
        const d = await act({type:"roll_initiative"});
        if (d) { render(); }
      }, true);
    } else {
      const span = document.createElement("div");
      span.innerHTML = `<span class="muted">${S.winner} won initiative — choose who moves first:</span>`;
      c.appendChild(span);
      for (const side of S.sides) {
        addBtn(c, `${side} first`, () => act({type:"choose_first", side}).then(after));
      }
    }
  } else if (phase === "move") {
    const left = S.figures.filter(f => f.side === S.moving_side && f.can_act && !f.acted).length;
    const span = document.createElement("div");
    span.innerHTML = `<span class="chip ${S.moving_side}">${S.moving_side}</span> to move`
      + ` — <b>${left}</b> left. Pick an action, set destination &amp; facing, then Confirm.`;
    c.appendChild(span);
    if (sel && chosenOption) drawMoveActions(c);
    addBtn(c, "Done with movement phase", () => {
      resetSelection(); act({type:"end_side_move"}).then(after);
    });
  } else if (phase === "combat") {
    const queued = S.queued || 0;
    const span = document.createElement("div");
    span.innerHTML = `Pick a character, then click a highlighted enemy — or Do nothing. `
      + `<b>${queued}</b> declared.`;
    c.appendChild(span);
    if (sel) drawCombatActions(c);
    addBtn(c, queued ? `Done with combat phase — resolve (${queued})` : "Done with combat phase",
      () => { act({type:"resolve_combat"}).then(() => { resetSelection(); render(); }); },
      true, queued === 0);
    addBtn(c, "End turn", () => { resetSelection(); act({type:"end_turn"}).then(after); });
  }
}

function drawMoveActions(c) {
  const needsDest = NEEDS_DEST.has(chosenOption) && !pendingDest;
  const f = figByUid(sel);
  const swap = WEAPON_CHANGE.has(chosenOption) && f && (f.weapons || []).length > 1;
  if (swap && pendingReady == null) {
    pendingReady = (f.weapons || []).find(w => w !== f.weapon) || f.weapon;
  }
  const wrap = document.createElement("div");
  wrap.style.marginTop = "8px";
  let html = `<div class="muted">Action: <b>${optLabel(chosenOption)}</b> · `
    + `dest ${pendingDest || "—"} · facing ${pendingFacing}</div>`;
  if (swap) {
    html += `<div style="margin-top:6px">Ready: <select id="readySel">`
      + (f.weapons || []).map(w => `<option ${w === pendingReady ? "selected" : ""}>${w}</option>`).join("")
      + `</select></div>`;
  }
  if (needsDest) html += `<div class="hint">Click a green hex to set the destination.</div>`;
  wrap.innerHTML = html;
  c.appendChild(wrap);
  if (swap) {
    wrap.querySelector("#readySel").addEventListener("change", e => { pendingReady = e.target.value; });
  }
  addBtn(c, "⟲ turn", () => { pendingFacing = (pendingFacing + 5) % 6; render(); });
  addBtn(c, "⟳ turn", () => { pendingFacing = (pendingFacing + 1) % 6; render(); });
  addBtn(c, "Confirm move", async () => {
    await act({type:"move", uid: sel, option: chosenOption, dest: pendingDest,
               facing: pendingFacing, ready: swap ? pendingReady : null});
    resetSelection(); after();
  }, true, needsDest);
  addBtn(c, "Cancel", () => { chosenOption = null; pendingDest = null; pendingReady = null; render(); });
}

function drawCombatActions(c) {
  const f = figByUid(sel);
  if (!f) return;
  const div = document.createElement("div");
  div.style.marginTop = "6px";
  div.innerHTML = validTargets().length
    ? `<span class="muted">Click a highlighted enemy to attack with ${f.name}, or:</span>`
    : `<span class="muted">${f.name} has no combat options this turn.</span>`;
  c.appendChild(div);
  addBtn(c, "Do nothing", () => { resetSelection(); render(); });
}

// Movement phase: once nothing is selected, auto-select the next character that
// still has to move (the human's side only — computer sides play themselves).
let autoBusy = false;
async function maybeAutoSelect() {
  if (autoBusy || sel || !S || S.phase !== "move") return;
  if ((S.controllers || {})[S.moving_side] === "computer") return;
  const next = S.figures.find(f => f.side === S.moving_side && f.can_act && !f.acted && f.label);
  if (!next) return;
  autoBusy = true;
  sel = next.uid; chosenOption = null; pendingDest = null;
  pendingFacing = next.facing; pendingReady = null;
  optInfo = await api(`/api/game/${GID}/options?uid=${next.uid}`);
  autoBusy = false;
  render();
}

function after() { render(); }

function bannerFor(phase) {
  if (S.victory) return `🏆 ${S.victory.toUpperCase()} wins the field!`;
  return `Turn ${S.turn} · ${PHASE_LABEL[phase] || phase}`;
}

// ---- interaction ------------------------------------------------------------
async function onFigureClick(f) {
  $("hint").textContent = "";
  if (S.phase === "move") {
    if (f.side !== S.moving_side) { flash(`${f.name} is not on the moving side.`); return; }
    sel = f.uid; chosenOption = null; pendingDest = null; pendingFacing = f.facing;
    optInfo = await api(`/api/game/${GID}/options?uid=${f.uid}`);
    render();
  } else if (S.phase === "combat") {
    const cur = sel ? figByUid(sel) : null;
    if (cur && f.side !== cur.side && validTargets().includes(f.uid)) {
      await act({type:"queue_attack", uid: sel, target: f.uid});
      flash(`${cur.name} → ${f.name} declared.`);
      render();
      return;
    }
    // select an attacker (must have chosen an attack option this turn)
    sel = f.uid; pendingFacing = f.facing;
    optInfo = await api(`/api/game/${GID}/options?uid=${f.uid}`);
    optInfo._targets = (f.weapon && missileReady(f))
      ? optInfo.missile_targets : optInfo.melee_targets;
    render();
  } else {
    sel = f.uid; render();
  }
}
function missileReady(f) {
  return optInfo && optInfo.missile_targets && optInfo.missile_targets.length >= 0
    && f.weapon && ["Longbow","Small bow","Horse bow","Sling","Thrown rock",
                    "Light crossbow","Heavy crossbow"].includes(f.weapon);
}

function onReachClick(label) {
  pendingDest = label; render();
}

// ---- side panels ------------------------------------------------------------
function drawSelInfo() {
  const box = $("selInfo");
  const f = sel ? figByUid(sel) : null;
  if (!f) { box.innerHTML = `<span class="muted">No figure selected.</span>`; return; }
  box.innerHTML =
    `<div><b>${f.name}</b> <span class="chip ${f.side}">${f.side}</span></div>` +
    (f.model === "tarmar"
      ? `<div class="muted">Fatigue ${f.fatigue}/${f.max_fatigue} · Body ${f.body}/${f.max_body} · adjDX ${f.dx} · ${f.armor}${f.shield ? " · "+f.shield : ""}</div>`
        + `<div class="muted">weapon skill: ${f.skill}</div>`
      : `<div class="muted">ST ${f.st}/${f.max_st} · adjDX ${f.dx} · ${f.armor}${f.shield ? " · "+f.shield : ""}</div>`) +
    `<div class="muted">weapon: ${f.weapon || "—"} · ${f.posture}` +
    `${f.engaged ? " · engaged" : ""}${f.dodging ? " · defending" : ""}</div>` +
    `<div class="muted">carrying: ${(f.weapons || []).join(", ") || "—"}</div>` +
    optionButtons(f);
}
function optionButtons(f) {
  if (S.phase !== "move" || f.uid !== sel || f.side !== S.moving_side || !optInfo) return "";
  let html = `<div style="margin-top:8px" class="muted">Choose an action:</div><div>`;
  for (const o of optInfo.options) {
    const cls = (o.option === chosenOption) ? "primary" : "";
    html += `<button class="${cls}" onclick="pickOption('${o.option}')">` +
            `${optLabel(o.option)}${o.is_attack ? " ⚔" : ""}</button>`;
  }
  return html + `</div>`;
}
function pickOption(opt) {
  chosenOption = opt;
  pendingDest = null;
  pendingReady = null;
  const f = figByUid(sel);
  pendingFacing = (pendingFacing == null) ? f.facing : pendingFacing;
  render();
}

function drawRoster() {
  const r = $("roster"); r.innerHTML = `<div class="muted">Roster</div>`;
  for (const f of S.figures) {
    const row = document.createElement("div");
    row.className = "row" + (f.dead || f.collapsed ? " dead" : "");
    const state = f.dead ? "dead" : f.collapsed ? "down"
      : `${hpCur(f)}/${hpMax(f)}` + (f.posture !== "standing" ? " · " + f.posture : "");
    row.innerHTML = `<span class="chip ${f.side}">${f.side}</span> ${f.name}` +
      `<span class="muted">${state}</span>`;
    row.addEventListener("click", () => onFigureClick(f));
    r.appendChild(row);
  }
}

function drawLog() {
  const l = $("log"); l.innerHTML = "";
  for (const line of S.log.slice().reverse()) {
    const d = document.createElement("div"); d.textContent = line; l.appendChild(d);
  }
}

function addBtn(parent, text, fn, primary, disabled) {
  const b = document.createElement("button");
  b.textContent = text; if (primary) b.className = "primary";
  if (disabled) b.disabled = true; else b.addEventListener("click", fn);
  parent.appendChild(b); return b;
}

// ---- pre-match fighter editor ----------------------------------------------
const DEFAULTS = {
  "Classic Melee": [
    {name:"Swordsman", side:"red", strength:12, dexterity:12, weapon:"Shortsword", weapon2:"Mace", armor:"Chainmail", shield:"Small shield"},
    {name:"Archer", side:"red", strength:14, dexterity:10, weapon:"Longbow", weapon2:"Shortsword", armor:"None", shield:"None"},
    {name:"Knight", side:"blue", strength:13, dexterity:11, weapon:"Broadsword", weapon2:"Mace", armor:"Plate", shield:"Large shield"},
    {name:"Spearman", side:"blue", strength:13, dexterity:11, weapon:"Spear", weapon2:"Shortsword", armor:"Leather", shield:"None"},
  ],
  "Tarmar": [
    {name:"Swordsman", side:"red", strength:12, dexterity:12, intelligence:10, wisdom:10, constitution:11, charisma:10, weapon:"Shortsword", weapon2:"Mace", armor:"Chainmail", shield:"Small shield", skill:3, skill2:1},
    {name:"Archer", side:"red", strength:12, dexterity:13, intelligence:10, wisdom:10, constitution:10, charisma:10, weapon:"Longbow", weapon2:"Shortsword", armor:"None", shield:"None", skill:3, skill2:1},
    {name:"Knight", side:"blue", strength:13, dexterity:11, intelligence:10, wisdom:10, constitution:11, charisma:10, weapon:"Broadsword", weapon2:"Mace", armor:"Plate", shield:"Large shield", skill:3, skill2:1},
    {name:"Spearman", side:"blue", strength:13, dexterity:11, intelligence:10, wisdom:10, constitution:10, charisma:10, weapon:"Spear", weapon2:"Shortsword", armor:"Leather", shield:"None", skill:2, skill2:1},
  ],
};
let CAT = null, RULES = null;

async function openEditor() {
  const profile = $("profile").value;
  CAT = await api(`/api/catalog?profile=${encodeURIComponent(profile)}`);
  RULES = CAT.stat_rules;
  const roster = $("editorRoster"); roster.innerHTML = "";
  (DEFAULTS[profile] || DEFAULTS["Classic Melee"]).forEach((f, i) =>
    roster.appendChild(fighterCard(f, i)));
  $("editorErr").textContent = "";
  $("editor").style.display = "flex";
}
function closeEditor() { $("editor").style.display = "none"; }

function optionTags(list, chosen) {
  return list.map(o => `<option ${o.name === chosen ? "selected" : ""}>${o.name}</option>`).join("");
}
function skillInput(key, value) {
  return RULES.model === "tarmar"
    ? `<label>skill <input type="number" data-skillkey="${key}" value="${value || 0}" `
      + `min="0" max="${RULES.skill_max}" style="width:46px"></label>` : "";
}
function fighterCard(f, side_i) {
  const card = document.createElement("div"); card.className = "card";
  const stats = RULES.fields.map(field =>
    `<label>${field.slice(0,3).toUpperCase()} <input type="number" data-stat="${field}" value="${f[field]}" `
    + `min="${RULES.min || 1}" max="${RULES.max || 30}" style="width:52px"></label>`).join(" ");
  card.dataset.side = f.side;
  card.innerHTML =
    `<div><span class="chip ${f.side}">${f.side}</span> `
    + `<input data-name value="${f.name}" style="width:130px"></div>`
    + `<div style="margin-top:6px">${stats} <span class="muted" data-budget></span></div>`
    + `<div style="margin-top:6px">Weapon <select data-eq="weapon">${optionTags(CAT.weapons, f.weapon)}</select> ${skillInput("skill", f.skill)}</div>`
    + `<div style="margin-top:6px">Weapon 2 <select data-eq="weapon2"><option ${!f.weapon2 || f.weapon2 === "None" ? "selected" : ""}>None</option>${optionTags(CAT.weapons, f.weapon2)}</select> ${skillInput("skill2", f.skill2)}</div>`
    + `<div style="margin-top:6px">Armour <select data-eq="armor">${optionTags(CAT.armors, f.armor || "None")}</select> `
    + `Shield <select data-eq="shield">${optionTags(CAT.shields, f.shield || "None")}</select></div>`
    + `<div class="hint" data-err></div>`;
  card.addEventListener("input", () => refreshCard(card));
  card.addEventListener("change", () => refreshCard(card));
  setTimeout(() => refreshCard(card), 0);
  return card;
}

function readCard(card) {
  const f = {side: card.dataset.side, name: card.querySelector("[data-name]").value};
  card.querySelectorAll("[data-stat]").forEach(i => f[i.dataset.stat] = parseInt(i.value || "0", 10));
  card.querySelectorAll("[data-eq]").forEach(s => f[s.dataset.eq] = s.value);
  card.querySelectorAll("[data-skillkey]").forEach(i => f[i.dataset.skillkey] = parseInt(i.value || "0", 10));
  return f;
}

function disableByStrength(select, strength, offset) {
  CAT.weapons.forEach((w, idx) => {
    const opt = select.options[idx + offset];
    if (opt) opt.disabled = (w.str_req || 0) > strength;
  });
}

function refreshCard(card) {
  const f = readCard(card);
  let note = "", err = "";
  if (RULES.model === "tarmar") {
    const total = RULES.fields.reduce((s, k) => s + (f[k] || 0), 0);
    note = `points ${total}/${RULES.budget}` + (total > RULES.budget ? " — over budget" : "");
  } else {
    const total = (f.strength || 0) + (f.dexterity || 0);
    const st = f.strength || 0;
    note = `ST+DX ${total}/${RULES.total}` + (total !== RULES.total ? ` — must equal ${RULES.total}` : "");
    disableByStrength(card.querySelector('[data-eq="weapon"]'), st, 0);
    disableByStrength(card.querySelector('[data-eq="weapon2"]'), st, 1);  // None is option 0
    for (const name of [f.weapon, f.weapon2]) {
      if (name && name !== "None") {
        const w = CAT.weapons.find(x => x.name === name);
        if (w && (w.str_req || 0) > st) err = `${name} needs ST ${w.str_req}`;
      }
    }
  }
  card.querySelector("[data-budget]").textContent = note;
  card.querySelector("[data-err]").textContent = err;
}

async function startCustom() {
  const fighters = Array.from($("editorRoster").children).map(readCard);
  const computer = ($("mode") && $("mode").value === "pxai") ? "blue" : "";
  const body = {profile: $("profile").value, computer, fighters};
  const data = await api("/api/game/new_custom", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)});
  if (data.error) { $("editorErr").textContent = "Can't start: " + data.error; return; }
  GID = data.gid; LAYOUT = data.layout; S = data.state; PROFILE = data.profile;
  closeEditor(); closeSetup(); resetSelection(); render();
}

bootGame();
