name: Deploy

on:
  # Auto-deploy only after the CI workflow (unit tests AND Playwright e2e) is
  # fully green on main. Previously this triggered directly on push, so a UI
  # regression the e2e job catches could still deploy to production while the
  # red e2e run merely emailed after the fact (#265). Manual dispatch stays
  # available for deploy / rollback / status.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      command:
        description: "deploy.sh subcommand: leave blank for a normal deploy, or 'rollback' / 'status'."
        required: false
        default: ""

jobs:
  deploy:
    # workflow_run fires on any CI conclusion; deploy only when CI succeeded, so
    # a red e2e (or red unit) run cannot reach production. Manual dispatch always
    # deploys (e.g. rollback/status).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: smarks/ops-workflows/.github/workflows/deploy-blue-green.yml@main
    with:
      app-dir: /home/sam/dev/melee
      command: ${{ inputs.command || '' }}
    secrets:
      ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}

  notify:
    needs: [deploy]
    # Skip when deploy itself was skipped (CI was red — CI already emailed);
    # only notify when a deploy actually ran.
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Email on failure or green-after-red
        uses: smarks/base_repo_template/.github/actions/notify@main
        with:
          job-status: ${{ needs.deploy.result }}
          mail-password: ${{ secrets.MAIL_PASSWORD }}
