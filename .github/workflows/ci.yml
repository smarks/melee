name: CI

# CI runs on pushes to main (the post-merge gate that also drives Deploy via
# workflow_run) and on pull requests targeting main. It deliberately does NOT
# run on every feature-branch push — that produced a duplicate run per commit
# and filled the Actions history with red from normal fix-iteration. Feature
# work is validated through its PR; main stays green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest -q --cov=engine --cov=board --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  # Browser-level end-to-end tests (Playwright). Kept in a separate job so the
  # fast unit gate above isn't slowed, but run here on Linux — where Playwright
  # is reliable — instead of only locally (where it hangs on the dev Mac), so
  # SPA/UI regressions are actually caught (#143).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pytest e2e/ -q

      - name: Upload match videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-videos
          path: e2e/videos/
          if-no-files-found: ignore

  # Browser-free unit tests for the pure client helpers extracted from board.js
  # (layout_geom.js geometry/snap maths, control_state.js turn-flow classifier).
  # Runs under node's built-in test runner — no bundler, no browser — so panel-
  # layout and Action-panel gating bugs are caught by a fast assertion instead of
  # only a Playwright scenario (#364/#366/#367).
  js-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run client unit tests
        run: node --test js-tests/*.test.js

  notify:
    needs: [test, e2e, js-unit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Email on failure or green-after-red
        uses: smarks/base_repo_template/.github/actions/notify@main
        with:
          job-status: ${{ (needs.test.result == 'success' && needs.e2e.result == 'success' && needs['js-unit'].result == 'success') && 'success' || 'failure' }}
          mail-password: ${{ secrets.MAIL_PASSWORD }}
